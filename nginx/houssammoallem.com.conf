server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name houssammoallem.com www.houssammoallem.com;
    return 301 https://houssammoallem.com$request_uri;
}

server {
    listen 443 ssl;
    server_name houssammoallem.com www.houssammoallem.com;

    server_tokens off;
    ssl_certificate /etc/nginx/ssl/houssammoallem.com.pem;
    ssl_certificate_key /etc/nginx/ssl/houssammoallem.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/houssammoallem;

    error_page 404 /404.html;
    error_page 403 /403.html;
    error_page 500 502 503 504 /50x.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; frame-ancestors 'none'; form-action 'none'" always;

    # German site
    location /de/ {
        alias /var/www/houssammoallem/DE/;
        index index.html;
        try_files $uri $uri/ =404;
        expires -1;
    }

    # English site
    location / {
        try_files /EN$uri /EN$uri/ $uri $uri/ =404;
        expires -1;
    }

    # GoatCounter
    location /count {
        proxy_pass http://127.0.0.1:8081/count;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /count.js {
        proxy_pass http://127.0.0.1:8081/count.js;
        proxy_set_header Host $host;
    }
    location /stats/ {
        auth_basic "GoatCounter Analytics";
        auth_basic_user_file /etc/nginx/.htpasswd-stats;
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /stats {
        return 301 /stats/;
    }
}
